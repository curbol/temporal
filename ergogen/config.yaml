# ------------
# Cases
# ------------
cases:
  mcu_cover:
    - what: outline
      name: mcu_cover
      extrude: 1.3
  _bottom_cutouts:
    - what: outline # Socket cutouts (1.85mm). Cut all the way through.
      name: _socket_cutouts_38
      extrude: bottom_thickness * 2
      shift: [0, 0, -bottom_thickness * 1.5]
    - what: outline # MCU cover M2 nut cutouts
      name: _mcu_cover_nut_cutout
      extrude: bottom_thickness * 2
      shift: [0, 0, -bottom_thickness * 1.5]
    - what: outline # Diode cutouts (1.15mm)
      name: _diode_cutouts
      extrude: bottom_thickness * 2
      shift: [0, 0, -1.2]
    - what: outline # Choc switch post cutouts (2.65mm through 1.6mm PCB = 1.25mm)
      name: _choc_posts_cutouts
      extrude: bottom_thickness * 2
      shift: [0, 0, -1.3]
    - what: outline # Choc switch post cutouts (3.5mm through 1.6mm PCB = 1.9mm)
      name: _encoder_posts_cutouts
      extrude: bottom_thickness * 2
      shift: [0, 0, -bottom_thickness * 1.5]
    - what: outline # Encoder pin cutouts (3.5mm, but can trim)
      name: _encoder_pins_cutouts
      extrude: bottom_thickness * 2
      shift: [0, 0, -1.4]
    - what: outline # MCU pin cutouts
      name: _mcu_pins_cutouts
      extrude: bottom_thickness * 2
      shift: [0, 0, -1]
    - what: outline # Display pin cutouts
      name: _display_pins_cutouts
      extrude: bottom_thickness * 2
      shift: [0, 0, -1]
    - what: outline # Battery pin cutouts
      name: _battery_pins_cutouts
      extrude: bottom_thickness * 2
      shift: [0, 0, -1]
  _bottom_cutouts_pinky:
    - what: outline # Socket cutouts
      name: _socket_cutouts_pinky
      extrude: bottom_thickness * 2
      shift: [0, 0, -bottom_thickness * 1.5]
  _bottom_cutouts_thumb:
    - what: outline # Socket cutouts
      name: _socket_cutouts_thumb
      extrude: bottom_thickness * 2
      shift: [0, 0, -bottom_thickness * 1.5]
  _wall_cutouts:
    - what: outline # Wall usb-c cutout
      name: _usbc_cutout
      extrude: 20
      shift: [0, 10, wall_height]
      rotate: [90, 0, 0]
    - what: outline # Wall power and reset cutouts
      name: _power_reset_cutout
      extrude: 10
      shift: [-5, 0, wall_height]
      rotate: [0, 90, 0]
  _posts:
    - what: outline # M2 heat-set insert posts
      name: _m2_insert_outer_posts
      extrude: m2_insert_post_height
      shift: [0, 0, 0]
    - what: outline
      operation: subtract
      name: _m2_insert_inner_posts
      extrude: m2_insert_hole_depth + 1
      shift: [0, 0, m2_insert_post_height - m2_insert_hole_depth]
  temporal_44:
    - what: outline # Bottom
      name: _case_outer_44
      extrude: bottom_thickness + wall_height
      shift: [0, 0, -bottom_thickness]
    - what: case
      operation: subtract
      name: _bottom_cutouts
    - what: case
      operation: subtract
      name: _bottom_cutouts_pinky
    - what: case
      operation: subtract
      name: _bottom_cutouts_thumb
    - what: outline # Walls
      operation: subtract
      name: _case_inner_44
      extrude: wall_height * 2
      shift: [0, 0, 0]
    - what: case
      operation: subtract
      name: _wall_cutouts
    - what: case
      name: _posts
  top_plate_44:
    - what: outline
      name: _top_plate_44
      extrude: 1.3
  temporal_42:
    - what: outline # Bottom
      name: _case_outer_42
      extrude: bottom_thickness + wall_height
      shift: [0, 0, -bottom_thickness]
    - what: case
      operation: subtract
      name: _bottom_cutouts
    - what: case
      operation: subtract
      name: _bottom_cutouts_pinky
    - what: outline # Walls
      operation: subtract
      name: _case_inner_42
      extrude: wall_height * 2
      shift: [0, 0, 0]
    - what: case
      operation: subtract
      name: _wall_cutouts
    - what: case
      name: _posts
  top_plate_42:
    - what: outline
      name: _top_plate_42
      extrude: 1.3
  temporal_40:
    - what: outline # Bottom
      name: _case_outer_40
      extrude: bottom_thickness + wall_height
      shift: [0, 0, -bottom_thickness]
    - what: case
      operation: subtract
      name: _bottom_cutouts
    - what: case
      operation: subtract
      name: _bottom_cutouts_thumb
    - what: outline # Walls
      operation: subtract
      name: _case_inner_40
      extrude: wall_height * 2
      shift: [0, 0, 0]
    - what: case
      operation: subtract
      name: _wall_cutouts
    - what: case
      name: _posts
  top_plate_40:
    - what: outline
      name: _top_plate_40
      extrude: 1.3
  temporal_38:
    - what: outline # Bottom
      name: _case_outer_38
      extrude: bottom_thickness + wall_height
      shift: [0, 0, -bottom_thickness]
    - what: case
      operation: subtract
      name: _bottom_cutouts
    - what: outline # Walls
      operation: subtract
      name: _case_inner_38
      extrude: wall_height * 2
      shift: [0, 0, 0]
    - what: case
      operation: subtract
      name: _wall_cutouts
    - what: case
      name: _posts
  top_plate_38:
    - what: outline
      name: _top_plate_38
      extrude: 1.3

# ------------
# PCBs
# ------------
pcbs:
  temporal:
    template: kicad8
    outlines:
      main:
        outline: pcb
    footprints:
      choc_hotswap:
        what: ceoloide/switch_choc_v1_v2
        where: true
        params:
          from: "{{colrow}}"
          to: "{{column_net}}"
          include_corner_marks: true
          include_keycap: true
          keycap_height: 16.5
          keycap_width: 17.5
          reversible: true
          hotswap: true
          choc_v2_support: false
          trace_width: 0.25
          via_size: 0.8
          via_drill: 0.4
      diode:
        what: ceoloide/diode_tht_sod123
        where: true
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
          include_tht: false
          reversible: true
          include_traces_vias: true
          via_size: 0.8
          via_drill: 0.4
        adjust:
          shift: [0, -5]
      encoder:
        what: ceoloide/rotary_encoder_ec11_ec12
        where:
          - ref: thumb_enc
        params:
          reversible: true
          include_plated_mounting_holes: false
          include_momentary_switch_pads: true
          smd_momentary_switch: true
          A: encoder_a # Left pin
          C: GND # Center pin
          B: encoder_b # Right pin
          S1: col_pinky # Switch pin 1
          S2: encoder_thumb # Switch pin 2

      mcu:
        what: ceoloide/mcu_nice_nano
        where:
          - ref: finger_inner_home
            shift: [19.8, 10.8 - voff]
        params:
          reversible: true
          reverse_mount: true
          show_silk_labels: false
          label_font_face: "Maple Mono NF SemiBold"
          # Finger rows
          P4: row_top
          P5: row_home
          P6: row_bottom
          P7: row_thumb
          # Finger columns
          P14: col_inner
          P15: col_index
          P18: col_middle
          P19: col_ring
          P20: col_pinky
          P21: col_extra
          # Encoder (using available pins)
          P0: encoder_a
          P1: encoder_b
          # SPI for nice!view
          P8: MOSI
          P9: SCK
          P10: CS
      display:
        what: ceoloide/display_nice_view
        params:
          reversible: true
          include_labels: false
        where:
          - ref: finger_inner_home
            shift: [19.8, 7.5 - voff]

      battery:
        what: ceoloide/battery_connector_jst_ph_2
        params:
          reversible: true
          include_traces_vias: true
          via_size: 0.8
          via_drill: 0.4
        where:
          - ref: finger_inner_home
            shift: [23.5, -14.5 - voff]
            rotate: -90

      power:
        what: ceoloide/power_switch_smd_side
        params:
          reversible: true
          include_traces_vias: true
          via_size: 0.8
          via_drill: 0.4
        where:
          - ref: finger_inner_home
            shift: [28.225, -18.5 - voff]
            rotate: 0
      reset:
        what: ceoloide/reset_switch_smd_side
        params:
          reversible: true
          include_traces_vias: true
          via_size: 0.8
          via_drill: 0.4
        where:
          - ref: finger_inner_home
            shift: [28.3, -10.2 - voff]
            rotate: -90

      temporal: &temporal_text
        what: ceoloide/utility_text
        where:
          - ref: finger_inner_top
            shift: [0, 0.58ky]
        params:
          text: "TEMPORAL"
          height: 1.5
          width: 1.8
          face: "Maple Mono NF SemiBold"
          reversible: true
      curbol:
        what: ceoloide/utility_text
        where:
          - ref: thumb_far
            shift: [0, -3]
        params:
          text: "by curbol"
          face: "Maple Mono NF SemiBold"
          reversible: true
      neuron:
        what: ceoloide/neuron
        where:
          - ref: finger_ring_bottom
            shift: [9.5, -10.5]
        params:
          reversible: true

      hole_1:
        what: ceoloide/mounting_hole_npth
        where:
          - ref: finger_middle_top
            shift: [hole1_x, hole1_y]

        params:
          hole_size: standoff_size
          hole_drill: standoff_size
      hole_2:
        what: ceoloide/mounting_hole_npth
        where:
          - ref: finger_inner_top
            shift: [hole2_x, hole2_y]
        params:
          hole_size: standoff_size
          hole_drill: standoff_size
      hole_3:
        what: ceoloide/mounting_hole_npth
        where:
          - ref: thumb_mid
            shift: [hole3_x, hole3_y]
        params:
          hole_size: standoff_size
          hole_drill: standoff_size
      hole_4:
        what: ceoloide/mounting_hole_npth
        where:
          - ref: thumb_enc
            shift: [hole4_x, hole4_y]
        params:
          hole_size: standoff_size
          hole_drill: standoff_size
      hole_5:
        what: ceoloide/mounting_hole_npth
        where:
          - ref: finger_ring_home
            shift: [hole5_x, hole5_y]
        params:
          hole_size: standoff_size
          hole_drill: standoff_size

      # MCU cover holes
      hole_screen_L:
        what: ceoloide/mounting_hole_npth
        where:
          - ref: finger_inner_bottom
            shift: [mcu_hole1_x, mcu_hole1_y]
        params:
