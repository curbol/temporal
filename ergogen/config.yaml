# Ergogen config file for TEMPORAL keyboard

# TEMPORAL, by Curtis Bollinger - @curbol
# https://github.com/curbol/temporal
# v1 - fall 2025

# ergogen docs: https://docs.ergogen.xyz/config-overview

meta:
  engine: 4.1.0
  version: 1.0
  author: curtis bollinger
  url: https://github.com/curbol/temporal

units:
  # Math
  sqrt_3: 1.73205080757

  # Display correct choc sizing
  $default_width: 18
  $default_height: 17
  # Proxy Spacing Variables
  kx: cx #choc spaced
  ky: cy
  # Padding Variables
  pad: 2.151
  px: kx + pad
  py: ky + pad

  # Vertical offset of mcu area items
  voff: 10.5

  # Finger splay
  finger_splay_1: 6
  finger_splay_2: 4
  thumb_splay: 15
  thumb_spread: 1kx - 0.15

  # Standoffs
  standoff_size: 5 # Size for standoff holes on pcb
  screen_standoff_size: 2

  # Top left
  hole1_x: -0.5 kx - 1
  hole1_y: -1 ky - 1

  # Top right
  hole2_x: -0.52 kx
  hole2_y: -0.35 ky

  # Thumb right
  hole3_x: 0.5 kx + 1
  hole3_y: 0.0 ky - 0.5

  # Thumb left
  hole4_x: 0.5 kx + 0.6
  hole4_y: 0.0 ky - 0.5

  # Far left
  hole5_x: -0.5 kx - 0.425
  hole5_y: -1.25 ky - 0.175

  # MCU Cover Holes
  mcu_hole1_x: 0.5kx + 4
  mcu_hole1_y: -0.5ky - voff + 7

  mcu_hole2_x: 0.5kx + 18
  mcu_hole2_y: -0.5ky - voff - 1.08

  # Extra Breakoff
  cut_w: 0.5
  cut_fillet: 0.24

  # Board
  base_fillet: 2.5

  # Case
  case_expand: 0.1
  bottom_thickness: 1.85
  wall_height: 1.6 + 2.2 + 0.1 # (PCB thickness + choc height below top-plate + a bit extra) Does not include bottom
  wall_thickness: 1.21 # Note: Small changes affact the curves on case_outer. Seems finicky.
  side_cut_width: 15
  side_cut_radius: 1.5

  # M2 heat-set insert posts
  m2_insert_inner_diameter: 2.7
  m2_insert_outer_diameter: 4.9
  m2_insert_post_height: 1.6 + 0.9 # PCB thickness + Choc gap under top-plate
  m2_insert_hole_depth: 3.95 # Max = bottom_thickness + m2_insert_post_height

  # M2 nut recesses for MCU cover standoffs
  m2_nut_width: 4.2 # (4mm + tolerance)

# ------------
# Points
# ------------
points:
  zones:
    finger:
      anchor.shift: [50, -100] # Fix KiCad placement
      key:
        padding: 1ky
        spread: 1kx
      columns:
        extra:
          rows.bottom.skip: true
          key.splay: finger_splay_1 + finger_splay_2
          key.column_net: col_extra
        pinky:
          key.stagger: 0.5ky
          key.column_net: col_pinky
        ring:
          key.stagger: 0.7ky
          key.splay: -finger_splay_1
          key.spread: 1kx + finger_splay_1 / 8
          key.column_net: col_ring
        middle:
          key.stagger: 0.525ky
          key.splay: -finger_splay_2
          key.spread: 1kx + finger_splay_2 / 8
          key.column_net: col_middle
        index:
          key.stagger: -0.5ky
          key.column_net: col_index
        inner:
          key.stagger: -0.15ky
          key.column_net: col_inner
      rows:
        bottom:
          row_net: row_bottom
        home:
          row_net: row_home
        top:
          row_net: row_top

    thumb:
      key:
        padding: 1ky
        spread: 1kx
      anchor:
        ref: finger_index_bottom
        shift: [-1.225kx, -1.39ky]
      columns:
        encoder:
          key.splay: finger_splay_1 + finger_splay_2
          key.spread: thumb_spread
          key.origin: [-0.5kx, -0.5ky]
          key.name: thumb_enc
          key.column_net: col_pinky
        near:
          key.splay: -finger_splay_1 - finger_splay_2
          key.spread: thumb_spread
          key.origin: [-0.5kx, -0.5ky]
          key.name: thumb_near
          key.column_net: col_ring
        mid:
          key.splay: -thumb_splay
          key.spread: thumb_spread
          key.origin: [-0.5kx, -0.5ky]
          key.name: thumb_mid
          key.column_net: col_middle
        far:
          key.splay: -thumb_splay
          key.spread: thumb_spread
          key.origin: [-0.5kx, -0.5ky]
          key.name: thumb_far
          key.column_net: col_index
        extra:
          key.splay: -thumb_splay
          key.spread: thumb_spread
          key.origin: [-0.5kx, -0.5ky]
          key.name: thumb_extra
          key.column_net: col_inner
      rows:
        thumb:
          row_net: row_thumb

# ------------
# Outlines
# ------------
outlines:
  _extra_pinky:
    - what: rectangle
      where:
        - finger_extra_top
        - finger_extra_home
      size: [1px, 3py]
      adjust:
        shift: [-pad, 0]
  _extra_thumb:
    - what: rectangle # Remove key
      where:
        - thumb_far
      size: [2px, 2py]
      adjust:
        shift: [0.5px + 1px, 0]
    - what: rectangle # Remove fillet by mcu area
      where:
        - ref: finger_inner_home
          shift: [19.4 + 21.7, -15 - voff]
      size: [21.7, 66.8]
    - what: rectangle # Remove fillet under thumb_far
      where:
        - thumb_far
      size: [px, py]
      adjust:
        shift: [0.5px, -1py]

  _mcu_area:
    - what: rectangle
      where:
        - ref: finger_inner_home
          shift: [19.4, -5 - voff]
      size: [21.7, 66.8]
  _display:
    - what: rectangle
      where:
        ref: finger_inner_home
        shift: [19.8, 6.75 - voff]
      size: [11, 25.5] # (10.8 x 25.3) + some buffer

  _mcu_cover_holes:
    - what: circle
      radius: screen_standoff_size / 2
      where:
        - ref: finger_inner_bottom
          shift: [mcu_hole1_x, mcu_hole1_y]
    - what: circle
      radius: screen_standoff_size / 2
      where:
        - ref: finger_inner_bottom
          shift: [mcu_hole2_x, mcu_hole2_y]
  _board_holes:
    - what: circle
      radius: 2.2 / 2
      where:
        - ref: finger_middle_top
          shift: [hole1_x, hole1_y]
    - what: circle
      radius: 2.2 / 2
      where:
        - ref: finger_inner_top
          shift: [hole2_x, hole2_y]
    - what: circle
      radius: 2.2 / 2
      where:
        - ref: thumb_mid
          shift: [hole3_x, hole3_y]
    - what: circle
      radius: 2.2 / 2
      where:
        - ref: thumb_enc
          shift: [hole4_x, hole4_y]
    - what: circle
      radius: 2.2 / 2
      where:
        - ref: finger_ring_home
          shift: [hole5_x, hole5_y]

  _socket:
    - what: rectangle # Center
      size: [2.7, 5]
      adjust:
        rotate: 42
        shift: [2, 5]
    - what: rectangle # Upper Left Big
      size: [4.1, 4.6]
      adjust:
        shift: [0, 5.95]
    - what: rectangle # Upper Left Small
      size: [2.6, 2.6]
      adjust:
        shift: [-3.3, 5.95]
    - what: rectangle # Lower Right Big
      size: [4.6, 4.7]
      adjust:
        shift: [4.75, 3.85]
    - what: rectangle # Lower Right Small
      size: [2.6, 2.6]
      expand: 0.3
      adjust:
        shift: [8.3, 3.735]
      fillet: 0.3
  _diode:
    - what: rectangle
      size: [4.2, 1.2]
      adjust:
        shift: [0, -5]
    - what: rectangle
      size: [2.8, 1.7]
      expand: 0.3
      adjust:
        shift: [0, -5]
      fillet: 0.3
  _choc_posts:
    - what: circle # Center
      radius: 2
    - what: circle # Left
      radius: 1.25
      adjust:
        shift: [-5.5, 0]
    - what: circle # Right
      radius: 1.25
      adjust:
        shift: [5.5, 0]
    - what: rectangle # Bridge to socket cutout
      size: [2.5, 2.5]
      adjust:
        shift: [5.5, 1.25]
  _mcu_pins_trench:
    - what: circle
      radius: 1.2
      adjust:
        shift: [0, 12.75]
    - what: rectangle
      size: [2.4, 28]
      adjust:
        shift: [0, -1.27]
    - what: circle
      radius: 1.2
      adjust:
        shift: [0, -15.25]
  _mcu_pins:
    - name: _mcu_pins_trench
      adjust:
        shift: [-7.62, 0]
    - name: _mcu_pins_trench
      adjust:
        shift: [7.62, 0]
  _display_pins:
    - what: circle
      radius: 1.2
      adjust:
        shift: [-5.1, -16.7]
    - what: rectangle
      size: [10.2, 2.4]
      adjust:
        shift: [0, -16.7]
    - what: circle
      radius: 1.2
      adjust:
        shift: [5.1, -16.7]
  _battery_pins:
    - what: rectangle
      size: [3, 3.8]
      fillet: 0.8
      adjust:
        shift: [-0.35, 0]
    - what: rectangle
      size: [3, 3.8]
      adjust:
        shift: [-1.85, 0]
  _encoder_pins:
    - what: circle
      radius: 0.6
      adjust:
        shift: [-2.75, -7.5]
    - what: rectangle
      size: [5.5, 1.2]
      adjust:
        shift: [0, -7.5]
    - what: circle
      radius: 0.6
      adjust:
        shift: [2.75, -7.5]

  _socket_cutouts_38:
    - name: _socket
      where: true
    - operation: subtract
      name: _extra_pinky
      adjust:
        shift: [3, 0]
    - operation: subtract
      name: _extra_thumb
      adjust:
        shift: [3, 0]
  _socket_cutouts_pinky:
    - name: _socket
      where:
        - finger_extra_top
        - finger_extra_home
  _socket_cutouts_thumb:
    - name: _socket
      where:
        - thumb_extra
  _diode_cutouts:
    - name: _diode
      where: true
  _choc_posts_cutouts:
    - name: _choc_posts
      where: true
  _encoder_posts_cutouts:
    - name: _choc_posts
      where:
        - thumb_enc
  _encoder_pins_cutouts:
    - name: _encoder_pins
      where:
        - thumb_enc
  _encoder_pins_plate_cutouts:
    - name: _encoder_pins_cutouts
    - what: rectangle
      size: [6.7, 1.2]
      where:
        - ref: thumb_enc
          shift: [0, -6.9]
      expand: -0.2
  _mcu_pins_cutouts:
    - name: _mcu_pins
      where:
        - ref: finger_inner_home
          shift: [19.8, 10.8 - voff]
  _display_pins_cutouts:
    - name: _display_pins
      where:
        - ref: finger_inner_home
          shift: [19.8, 7.5 - voff]
  _battery_pins_cutouts:
    - name: _battery_pins
      where:
        - ref: finger_inner_home
          shift: [23.5, -14.5 - voff]

  _case_cutout_template:
    - what: circle
      radius: side_cut_radius
      adjust:
        shift: [-(side_cut_width / 2) + side_cut_radius, -side_cut_radius]
    - what: circle
      radius: side_cut_radius
      adjust:
        shift: [(side_cut_width / 2) - side_cut_radius, -side_cut_radius]
    - what: rectangle
      size: [side_cut_width - side_cut_radius * 2, side_cut_radius * 4]
      adjust:
        shift: [0, 0]
    - what: rectangle
      size: [side_cut_width + side_cut_radius * 2, side_cut_radius * 2]
      adjust:
        shift: [0, 0]
    - what: circle
      operation: subtract
      radius: side_cut_radius
      adjust:
        shift: [-(side_cut_width / 2) - side_cut_radius, -side_cut_radius]
    - what: circle
      operation: subtract
      radius: side_cut_radius
      adjust:
        shift: [(side_cut_width / 2) + side_cut_radius, -side_cut_radius]
  _usbc_cutout:
    - name: _case_cutout_template
      where:
        - ref: finger_inner_home
          shift: [19.8, 25 + side_cut_radius * 2 - voff]
          rotate: 0
  _power_reset_cutout:
    - name: _case_cutout_template
      where:
        - ref: finger_inner_home
          shift: [27.5 + side_cut_radius * 2, -14.95 - voff]
          rotate: 90

  _m2_nut:
    - what: polygon
      adjust:
        shift: [m2_nut_width / (2 * sqrt_3), m2_nut_width / 2]
      points:
        - shift: [m2_nut_width / (2 * sqrt_3), -m2_nut_width / 2]
        - shift: [-m2_nut_width / (2 * sqrt_3), -m2_nut_width / 2]
        - shift: [-m2_nut_width / sqrt_3, 0]
        - shift: [-m2_nut_width / (2 * sqrt_3), m2_nut_width / 2]
        - shift: [m2_nut_width / (2 * sqrt_3), m2_nut_width / 2]
        - shift: [m2_nut_width / sqrt_3, 0]
  _mcu_cover_nut_cutout:
    - name: _m2_nut
      where:
        - ref: finger_inner_bottom
          shift: [mcu_hole1_x, mcu_hole1_y]
    - name: _m2_nut
      where:
        - ref: finger_inner_bottom
          shift: [mcu_hole2_x, mcu_hole2_y]
  _m2_insert_outer_post:
    - what: circle
      radius: m2_insert_outer_diameter / 2
  _m2_insert_outer_posts:
    - name: _m2_insert_outer_post
      where:
        - ref: finger_middle_top
          shift: [hole1_x, hole1_y]
    - name: _m2_insert_outer_post
      where:
        - ref: finger_inner_top
          shift: [hole2_x, hole2_y]
    - name: _m2_insert_outer_post
      where:
        - ref: thumb_mid
          shift: [hole3_x, hole3_y]
    - name: _m2_insert_outer_post
      where:
        - ref: thumb_enc
          shift: [hole4_x, hole4_y]
    - name: _m2_insert_outer_post
      where:
        - ref: finger_ring_home
          shift: [hole5_x, hole5_y]
  _m2_insert_inner_post:
    - what: circle
      radius: m2_insert_inner_diameter / 2
  _m2_insert_inner_posts:
    - name: _m2_insert_inner_post
      where:
        - ref: finger_middle_top
          shift: [hole1_x, hole1_y]
    - name: _m2_insert_inner_post
      where:
        - ref: finger_inner_top
          shift: [hole2_x, hole2_y]
    - name: _m2_insert_inner_post
      where:
        - ref: thumb_mid
          shift: [hole3_x, hole3_y]
    - name: _m2_insert_inner_post
      where:
        - ref: thumb_enc
          shift: [hole4_x, hole4_y]
    - name: _m2_insert_inner_post
      where:
        - ref: finger_ring_home
          shift: [hole5_x, hole5_y]

  _thumb:
    - what: rectangle # Fill gap with finger keys
      where:
        - thumb_enc
        - thumb_near
        - thumb_mid
        - thumb_far
        - thumb_extra
      size: [px, py]
    - what: polygon # Main thumb area
      fillet: 15
      points:
        - ref: thumb_enc
          shift: [-0.5px, 1.75py]
        - ref: thumb_near
          shift: [0.5px, 1.75py]
        - ref: thumb_far
          shift: [-0.75px, 0.5py]
        - ref: thumb_far
          shift: [0.561px, 0.5py]
        - ref: thumb_extra
          shift: [0.5px, 0.5py]
        - ref: thumb_extra
          shift: [0.5px, 0py]
        - ref: thumb_extra
          shift: [-0.5px, 0py]
        - ref: thumb_far
          shift: [-0.5px, 0py]
        - ref: thumb_mid
          shift: [-0.5px, 0py]
        - ref: thumb_near
          shift: [-0.5px, 0py]
        - ref: thumb_enc
          shift: [-0.5px, 0py]
    - what: rectangle # Fill gap with finger keys
      where:
        - finger_inner_bottom
      size: [px, py]
      adjust:
        shift: [0px, -0.5py]

  _thumb_smooth: # Smooth curve from thmub to mcu area
    - name: _mcu_area
    - what: rectangle
      where:
        - thumb_extra
      size: [2px, py]
      adjust:
        shift: [-1px, 0.00001py]
      fillet: 10

  _finger_fill: # Fill in gaps between splays
    - what: rectangle
      where:
        - finger_pinky_top
        - finger_pinky_home
        - finger_pinky_bottom
        - finger_ring_top
        - finger_ring_home
        - finger_index_top
      size: [px, py]
      adjust:
        shift: [1kx, 0ky]

  _keys:
    - what: rectangle
      where: true
      size: [px, py]
  _key_plugs:
    - what: rectangle
      where: true
      size: [13.8, 13.8]
      fillet: 0.25
    - name: _encoder_pins_plate_cutouts

  _keys_area_44:
    - name: _keys
    - name: _finger_fill
    - name: _thumb
  _keys_area_42:
    - name: _keys_area_44
    - operation: subtract
      name: _extra_thumb
  _keys_area_40:
    - name: _keys_area_44
    - operation: subtract
      name: _extra_pinky
  _keys_area_38:
    - name: _keys_area_40
    - operation: subtract
      name: _extra_thumb

  _board_44:
    - name: _mcu_area
    - name: _keys_area_44
    - name: _thumb_smooth
  _board_42:
    - name: _board_44
    - operation: subtract
      name: _extra_thumb
  _board_40:
    - name: _board_44
    - operation: subtract
      name: _extra_pinky
  _board_38:
    - name: _board_40
    - operation: subtract
      name: _extra_thumb

  _break_cut_inner:
    - name: _board_38
      fillet: base_fillet
  _break_cut:
    - name: _break_cut_inner
      expand: cut_w
      joints: 1
    - operation: subtract
      name: _break_cut_inner
    - what: rectangle # Make top of thumb break straight so fillet works
      size: [cut_w, 1py]
      where:
        - thumb_far
      adjust:
        shift: [0.5px + cut_w / 2, 0.5py]
  _break_bridge:
    - what: rectangle
      adjust:
        shift: [0, 0.5py - 5.75]
      size: [cut_w * 2, 4]
    - what: rectangle
      adjust:
        shift: [0, -0.5py + 5]
      size: [cut_w * 2, 4]
  _break_bridges:
    - name: _break_bridge
      where:
        - finger_extra_top
        - finger_extra_home
      adjust:
        shift: [0.5px - pad - cut_w / 2, 0]
    - name: _break_bridge
      where:
        - thumb_far
      adjust:
        shift: [0.5px + cut_w / 2, 0]
  _break:
    - name: _break_cut
    - operation: subtract
      name: _break_bridges

  # Board 44
  _case_inner_44_1:
    - name: _board_44
      fillet: base_fillet
  _case_inner_44:
    - name: _case_inner_44_1
      expand: case_expand
      joints: 1
  _case_outer_44_1: # Need to do hacky stuff to get expand and fillet working together
    - name: _board_44
      expand: case_expand + wall_thickness
      joints: 1
  _case_outer_44:
    - name: _case_outer_44_1
      fillet: base_fillet
  _top_plate_44:
    - name: _keys_area_44
      fillet: base_fillet
    - operation: subtract
      name: _key_plugs
    - operation: subtract
      name: _board_holes
  _back_plate_44:
    - name: _board_44
      fillet: base_fillet
    - operation: subtract
      name: _board_holes

  # Board 42
  _case_inner_42_1:
    - name: _board_42
      fillet: base_fillet
  _case_inner_42:
    - name: _case_inner_42_1
      expand: case_expand
      joints: 1
  _case_outer_42_1:
    - name: _board_42
      expand: case_expand + wall_thickness
      joints: 1
  _case_outer_42:
    - name: _case_outer_42_1
      fillet: base_fillet
  _top_plate_42:
    - name: _keys_area_42
      fillet: base_fillet
    - operation: subtract
      name: _key_plugs
    - operation: subtract
      name: _board_holes
  _back_plate_42:
    - name: _board_42
      fillet: base_fillet
    - operation: subtract
      name: _board_holes

  # Board 40
  _case_inner_40_1:
    - name: _board_40
      fillet: base_fillet
  _case_inner_40:
    - name: _case_inner_40_1
      expand: case_expand
      joints: 1
  _case_outer_40_1:
    - name: _board_40
      expand: case_expand + wall_thickness
      joints: 1
  _case_outer_40:
    - name: _case_outer_40_1
      fillet: base_fillet
  _top_plate_40:
    - name: _keys_area_40
      fillet: base_fillet
    - operation: subtract
      name: _key_plugs
    - operation: subtract
      name: _board_holes
  _back_plate_40:
    - name: _board_40
      fillet: base_fillet
    - operation: subtract
      name: _board_holes

  # Board 38
  _case_inner_38_1:
    - name: _board_38
      fillet: base_fillet
  _case_inner_38:
    - name: _case_inner_38_1
      expand: case_expand
      joints: 1
  _case_outer_38_1:
    - name: _board_38
      expand: case_expand + wall_thickness
      joints: 1
  _case_outer_38:
    - name: _case_outer_38_1
      fillet: base_fillet
  _top_plate_38:
    - name: _keys_area_38
      fillet: base_fillet
    - operation: subtract
      name: _key_plugs
    - operation: subtract
      name: _board_holes
  _back_plate_38:
    - name: _board_38
      fillet: base_fillet
    - operation: subtract
      name: _board_holes

  # Common
  pcb:
    - name: _board_44
      fillet: base_fillet
    - operation: subtract
      name: _break
      fillet: cut_fillet

  mcu_cover:
    - name: _mcu_area
    - operation: subtract
      name: _keys_area_44
    - what: rectangle
      operation: subtract
      where:
        - thumb_far
      size: [2px, py]
      adjust:
        shift: [1px, 0.00001]
      fillet: base_fillet
    - operation: subtract
      name: _display
      fillet: cut_fillet
    - operation: subtract
      name: _mcu_cover_holes

  _preview_44:
    - name: _case_outer_44
    - name: _case_inner_44
      operation: subtract
    - name: _top_plate_44
    - name: mcu_cover
      adjust:
        shift: [0.01, 0]
  _preview_42:
    - name: _case_outer_42
    - name: _case_inner_42
      operation: subtract
    - name: _top_plate_42
    - name: mcu_cover
